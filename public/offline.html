<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiftBI — Geen verbinding</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100svh;
      background: #15171A;
      color: #EDEEF0;
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 24px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: #FF4B3E;
    }

    p {
      color: #9499A1;
      font-size: 1rem;
      line-height: 1.6;
      text-align: center;
      max-width: 280px;
    }

    .icon {
      font-size: 2.5rem;
      opacity: 0.4;
    }

    button {
      margin-top: 8px;
      background: #FF4B3E;
      color: #EDEEF0;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Lift<span>BI</span></h1>
  <p>LiftBI heeft een internetverbinding nodig om je trainingsdata te laden.</p>
  <button onclick="window.location.reload()">Opnieuw proberen</button>
</body>
</html>
